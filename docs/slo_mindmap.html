<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e2e2ec;--muted:#7a7a95;--dim:#3e3e52;
  --blue:#7eb8ff;--blue-dim:rgba(126,184,255,.12);--blue-glow:rgba(126,184,255,.25);
  --green:#6ee7b7;--green-dim:rgba(110,231,183,.1);
  --amber:#fcd34d;--amber-dim:rgba(252,211,77,.1);
  --red:#f87171;--red-dim:rgba(248,113,113,.1);
  --purple:#c4b5fd;--purple-dim:rgba(196,181,253,.1);
  --mono:'DM Mono','Fira Mono','Courier New',monospace;
}
html{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  font-size:16px;line-height:1.7;}
body{min-height:100vh;width:100%;padding:40px 24px 80px;}

/* ── Nav bar ── */
.nav{display:flex;align-items:center;gap:12px;margin-bottom:40px;
  padding-bottom:20px;border-bottom:1px solid var(--border);}
.nav-course{font-family:var(--mono);font-size:11px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);padding:3px 10px;
  border:1px solid var(--border2);border-radius:4px;}
.nav-title{font-size:14px;font-weight:600;color:var(--text);}
.nav-week{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;}

/* ── Week header ── */
.wk-header{margin-bottom:36px;}
.wk-num{font-family:var(--mono);font-size:11px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--blue);margin-bottom:8px;}
.wk-title{font-size:28px;font-weight:700;letter-spacing:-.02em;
  color:var(--text);line-height:1.2;margin-bottom:10px;}
.wk-deck{font-size:15px;color:var(--muted);font-style:italic;
  line-height:1.5;margin-bottom:16px;padding-left:14px;
  border-left:2px solid var(--dim);}
.wk-meta{display:flex;gap:8px;flex-wrap:wrap;}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.07em;
  padding:3px 10px;border-radius:20px;
  background:var(--bg3);color:var(--muted);border:1px solid var(--border);}
.chip.blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(126,184,255,.25);}
.chip.green{background:var(--green-dim);color:var(--green);border-color:rgba(110,231,183,.25);}
.chip.amber{background:var(--amber-dim);color:var(--amber);border-color:rgba(252,211,77,.25);}

/* ── Section headings ── */
h2{font-size:18px;font-weight:700;color:var(--text);margin:40px 0 12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);}
h3{font-size:14px;font-weight:700;font-family:var(--mono);letter-spacing:.06em;
  text-transform:uppercase;color:var(--muted);margin:28px 0 8px;}

/* ── Body text ── */
p{color:var(--muted);font-size:15px;line-height:1.75;margin-bottom:12px;}
p strong{color:var(--text);font-weight:600;}
p code, li code{font-family:var(--mono);font-size:.88em;
  background:var(--bg3);padding:1px 5px;border-radius:3px;
  color:var(--blue);}

/* ── Concept cards ── */
.concept{background:var(--blue-dim);border:1px solid rgba(126,184,255,.2);
  border-left:3px solid var(--blue);border-radius:0 8px 8px 0;
  padding:14px 18px;margin:16px 0;}
.concept-label{font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:6px;}
.concept p{color:var(--text);font-size:14px;margin:0;}

.warn{background:var(--amber-dim);border:1px solid rgba(252,211,77,.2);
  border-left:3px solid var(--amber);border-radius:0 8px 8px 0;
  padding:14px 18px;margin:16px 0;}
.warn .concept-label{color:var(--amber);}
.warn p{color:var(--text);font-size:14px;margin:0;}

.ok{background:var(--green-dim);border:1px solid rgba(110,231,183,.2);
  border-left:3px solid var(--green);border-radius:0 8px 8px 0;
  padding:14px 18px;margin:16px 0;}
.ok .concept-label{color:var(--green);}
.ok p{color:var(--text);font-size:14px;margin:0;}

/* ── Code blocks ── */
pre{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:16px 20px;overflow-x:auto;margin:16px 0;}
pre code{font-family:var(--mono);font-size:13px;color:#c9d1d9;
  line-height:1.7;background:none;padding:0;}
.code-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:6px;}

/* ── Lists ── */
ul,ol{padding-left:20px;margin:10px 0 16px;}
li{color:var(--muted);font-size:15px;line-height:1.75;margin-bottom:4px;}
li strong{color:var(--text);}
li::marker{color:var(--dim);}

/* ── Checklist ── */
.checklist{list-style:none;padding:0;}
.checklist li{display:flex;gap:10px;align-items:flex-start;
  padding:7px 0;border-bottom:1px solid var(--border);}
.checklist li:last-child{border-bottom:none;}
.checklist li::before{content:'☐';color:var(--green);font-size:16px;
  flex-shrink:0;line-height:1.4;}

/* ── Topics grid ── */
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.topic-item{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;}
.topic-num{font-family:var(--mono);font-size:9px;color:var(--dim);
  letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase;}
.topic-text{font-size:13px;color:var(--text);font-weight:600;}
.topic-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* ── Key terms ── */
.term{display:flex;gap:16px;padding:10px 0;border-bottom:1px solid var(--border);
  align-items:baseline;}
.term:last-child{border-bottom:none;}
.term-word{font-family:var(--mono);font-size:13px;font-weight:700;
  color:var(--blue);min-width:180px;flex-shrink:0;}
.term-def{font-size:14px;color:var(--muted);}

/* ── Before you start / self-check ── */
.check-block{background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:20px;margin:20px 0;}
.check-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;}

/* ── Footer ── */
.page-footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:10px;color:var(--dim);
  letter-spacing:.08em;text-align:center;}

/* ism-mobile */
@media(max-width:600px){
  body{padding:16px 14px 48px!important}
  .wrapper{padding-left:14px!important;padding-right:14px!important}
  .two-col{grid-template-columns:1fr!important}
  .concept-table{display:block;overflow-x:auto}
  .pn{grid-template-columns:1fr}
  .vpl-tile{min-width:unset;flex:1 1 100%}
  pre,code{font-size:12px}
  .two-pane{flex-direction:column}
}

#mm-legend {

.mm-legend-dot {

// ── Layout engine ─────────────────────────────────────────────────────────
var nodes = [];
var edges = [];

function layoutTree(node, x, y, angle, spreadAngle, depth) {
  node.x = x; node.y = y;
  nodes.push(node);
  if (!node.children || node.children.length === 0) return;

  var n = node.children.length;
  var baseLen = [0, 180, 150, 110, 90][depth] || 80;
  var startAngle = angle - spreadAngle/2;
  var step = n > 1 ? spreadAngle / (n-1) : 0;

  node.children.forEach(function(child, i) {
    var a = n === 1 ? angle : startAngle + i * step;
    var len = baseLen + child.r * 1.4;
    var cx = x + Math.cos(a * Math.PI/180) * len;
    var cy = y + Math.sin(a * Math.PI/180) * len;
    var childSpread = Math.max(20, spreadAngle / n);
    layoutTree(child, cx, cy, a, childSpread, depth+1);
    edges.push({from: node, to: child});
  });
}

// SLOs arranged at 210°, 270°(right), 330° so tree fans left
var sloAngles = [210, 340, 90];
TREE.children.forEach(function(slo, i) {
  var a = sloAngles[i];
  var spread = slo.children.length === 1 ? 60 :
               slo.children.reduce(function(s,u){return s + u.children.length;},0) * 22;
  layoutTree(slo,
    Math.cos(a*Math.PI/180)*200, Math.sin(a*Math.PI/180)*200,
    a, spread, 1);
  edges.push({from: TREE, to: slo});
});
TREE.x = 0; TREE.y = 0;
nodes.unshift(TREE);

// ── Canvas setup ──────────────────────────────────────────────────────────
var canvas = document.getElementById('mm-canvas');
var ctx    = canvas.getContext('2d');
var wrap   = document.getElementById('mm-wrap');
var TIP    = document.getElementById('mm-tooltip');

var W, H;
var offsetX = 0, offsetY = 0, scale = 1;
var panning = false, panStartX, panStartY, panOX, panOY;
var initialized = false;

function resize() {
  W = wrap.clientWidth;
  H = Math.max(600, window.innerHeight * 0.72);
  canvas.width  = W;
  canvas.height = H;
  wrap.style.height = H + 'px';
  if (!initialized && W > 0) { offsetX = W/2; offsetY = H/2; initialized = true; }
  draw();
}

function resetView() {
  scale = 1; offsetX = W/2; offsetY = H/2;
  draw();
}

function zoom(factor) {
  scale *= factor;
  scale = Math.max(0.3, Math.min(3.5, scale));
  draw();
}

// ── Drawing ───────────────────────────────────────────────────────────────
function toScreen(x, y) {
  return [x * scale + offsetX, y * scale + offsetY];
}

function drawNode(node) {
  var s = toScreen(node.x, node.y);
  var sx = s[0], sy = s[1];
  var r = node.r * scale;

  // Glow for SLO nodes
  if (node.type === 'slo' || node.type === 'root') {
    ctx.beginPath();
    ctx.arc(sx, sy, r + 6, 0, Math.PI*2);
    ctx.fillStyle = node.color + '22';
    ctx.fill();
  }

  // Circle
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = node.color;
  ctx.fill();
  if (node.type === 'week') {
    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Text
  var lines = (node.label + '\n' + (node.sublabel||'')).split('\n').filter(Boolean);
  var labelLine = lines[0];
  var subLines  = lines.slice(1);

  ctx.fillStyle = node.textColor || '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (subLines.length > 0) {
    var labelSize = (node.type === 'root' ? 18 : node.type === 'slo' ? 16 : node.type === 'unit' ? 13 : 11) * Math.min(scale, 1.4);
    var subSize   = (node.type === 'root' ? 10 : 9) * Math.min(scale, 1.4);
    var totalH    = labelSize + subLines.length * (subSize + 2);
    var startY    = sy - totalH/2 + labelSize/2;

    ctx.font = 'bold ' + labelSize + 'px "DM Mono", monospace';
    ctx.fillText(labelLine, sx, startY);

    ctx.font = subSize + 'px "DM Mono", monospace';
    ctx.fillStyle = node.textColor === '#0d1117' ? 'rgba(0,0,0,.55)' : 'rgba(255,255,255,.65)';
    subLines.forEach(function(l, li) {
      ctx.fillText(l, sx, startY + labelSize + li*(subSize+2) + 2);
    });
  } else {
    var fs = (node.type === 'root' ? 18 : node.type === 'slo' ? 16 : node.type === 'unit' ? 13 : 11) * Math.min(scale, 1.4);
    ctx.font = 'bold ' + fs + 'px "DM Mono", monospace';
    ctx.fillText(labelLine, sx, sy);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Edges
  edges.forEach(function(e) {
    var fs = toScreen(e.from.x, e.from.y);
    var ts = toScreen(e.to.x,   e.to.y);
    var fr = e.from.r * scale;
    var tr = e.to.r   * scale;
    var dx = ts[0]-fs[0], dy = ts[1]-fs[1];
    var dist = Math.sqrt(dx*dx+dy*dy);
    var ux = dx/dist, uy = dy/dist;
    var x1 = fs[0]+ux*fr, y1 = fs[1]+uy*fr;
    var x2 = ts[0]-ux*tr, y2 = ts[1]-uy*tr;

    var grad = ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0, e.from.color + 'aa');
    grad.addColorStop(1, e.to.color   + 'aa');
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.strokeStyle = grad;
    ctx.lineWidth   = Math.max(1, (e.to.type==='week' ? 1.5 : e.to.type==='unit' ? 2.5 : 3.5) * Math.min(scale,1.5));
    ctx.stroke();
  });

  // Nodes (units first, then SLOs, then weeks, then root on top)
  var order = ['unit','week','slo','root'];
  order.forEach(function(t) {
    nodes.filter(function(n){return n.type===t;}).forEach(drawNode);
  });
}

// ── Interaction ───────────────────────────────────────────────────────────
function hitTest(mx, my) {
  var found = null;
  nodes.forEach(function(node) {
    var s = toScreen(node.x, node.y);
    var r = node.r * scale;
    var dx = mx - s[0], dy = my - s[1];
    if (dx*dx + dy*dy <= r*r) found = node;
  });
  return found;
}

canvas.addEventListener('mousedown', function(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var hit = hitTest(mx, my);
  if (!hit) {
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOX = offsetX; panOY = offsetY;
    canvas.classList.add('panning');
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (panning) {
    offsetX = panOX + (e.clientX - panStartX);
    offsetY = panOY + (e.clientY - panStartY);
    draw();
    TIP.style.display = 'none';
    return;
  }
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var hit = hitTest(mx, my);
  if (hit && hit.tooltip_title) {
    TIP.style.display = 'block';
    TIP.style.left    = (e.clientX + 16) + 'px';
    TIP.style.top     = (e.clientY - 12) + 'px';
    TIP.innerHTML =
      '<div class="tt-label" style="color:' + hit.color + '">' +
        (hit.type === 'week' ? 'Week ' + hit.wn + ' Objective' :
         hit.type === 'unit' ? 'Unit Objective' : 'Course SLO') +
      '</div>' +
      '<div class="tt-title">' + hit.tooltip_title + '</div>' +
      '<div class="tt-body">' + hit.tooltip_body.replace(/\n/g,'<br>') + '</div>' +
      (hit.type === 'week' ? '<div style="margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);">Double-click to open reading page</div>' : '');
    canvas.style.cursor = 'pointer';
  } else {
    TIP.style.display = 'none';
    canvas.style.cursor = panning ? 'grabbing' : 'grab';
  }
});

canvas.addEventListener('mouseup', function() {
  panning = false;
  canvas.classList.remove('panning');
});

canvas.addEventListener('mouseleave', function() {
  panning = false;
  canvas.classList.remove('panning');
  TIP.style.display = 'none';
});

canvas.addEventListener('dblclick', function(e) {
  var rect = canvas.getBoundingClientRect();
  var hit = hitTest(e.clientX-rect.left, e.clientY-rect.top);
  if (hit && hit.type === 'week' && hit.wn) {
    window.location.href = 'week' + String(hit.wn).padStart(2,'0') + '_reading.html';
  }
});

// Wheel zoom
canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var factor = e.deltaY < 0 ? 1.1 : 0.9;
  var newScale = Math.max(0.3, Math.min(3.5, scale * factor));
  offsetX = mx - (mx - offsetX) * (newScale/scale);
  offsetY = my - (my - offsetY) * (newScale/scale);
  scale = newScale;
  draw();
}, {passive: false});

// Touch
var lastTouchDist = null;
canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    panning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    panOX = offsetX; panOY = offsetY;
  }
}, {passive:true});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    var dx = e.touches[0].clientX - e.touches[1].clientX;
    var dy = e.touches[0].clientY - e.touches[1].clientY;
    var dist = Math.sqrt(dx*dx+dy*dy);
    if (lastTouchDist) {
      var f = dist/lastTouchDist;
      scale = Math.max(0.3, Math.min(3.5, scale*f));
    }
    lastTouchDist = dist;
    draw();
  } else if (e.touches.length === 1 && panning) {
    offsetX = panOX + (e.touches[0].clientX - panStartX);
    offsetY = panOY + (e.touches[0].clientY - panStartY);
    draw();
  }
}, {passive:false});
canvas.addEventListener('touchend', function() {
  panning = false; lastTouchDist = null;
}, {passive:true});

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', function() { resize(); resetView(); });
resize();
setTimeout(resetView, 50);

window.zoom = zoom;
window.resetView = resetView;

})();
</script>
</body>
</html>
